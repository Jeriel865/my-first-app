  <path d="M200 234c29 39 43 85 44 139-24 10-46 4-67-18-2-44 5-84 23-121Z" fill="#080909"/>
  <path d="M86 285h106l-18 26H105Z" fill="#ff3d6e" filter="url(#rimGlow)"/>
