<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 460" role="img" aria-labelledby="title desc">
  <title id="title">Smooth target character</title>
  <desc id="desc">A smooth cinematic target in a tailored coat under neon light.</desc>
  <defs>
    <linearGradient id="coat" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f3ead0"/>
      <stop offset=".18" stop-color="#c6bda1"/>
      <stop offset=".34" stop-color="#171719"/>
      <stop offset="1" stop-color="#040506"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" x2="1">
      <stop offset="0" stop-color="#00e6d0"/>
      <stop offset=".65" stop-color="#ffd166"/>
      <stop offset="1" stop-color="#ff3d6e"/>
    </linearGradient>
    <filter id="rimGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

