<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Vibrant rooftop city at night</title>
  <desc id="desc">A painterly neon rooftop city scene at night with a bright moon, cinematic lighting, and wet rooftops.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07080d"/>
      <stop offset=".38" stop-color="#17101a"/>
      <stop offset=".68" stop-color="#05251f"/>
      <stop offset="1" stop-color="#050607"/>
    </linearGradient>
    <radialGradient id="moon" cx="78%" cy="18%" r="18%">
      <stop offset="0" stop-color="#fff7d8"/>
      <stop offset=".3" stop-color="#ffe7a3"/>
      <stop offset=".36" stop-color="#ffd166" stop-opacity=".62"/>
      <stop offset="1" stop-color="#ffd166" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neonRed" cx="28%" cy="62%" r="45%">
      <stop offset="0" stop-color="#ff3d6e" stop-opacity=".34"/>
      <stop offset=".58" stop-color="#ff3d6e" stop-opacity=".08"/>
      <stop offset="1" stop-color="#ff3d6e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neonCyan" cx="84%" cy="58%" r="42%">
      <stop offset="0" stop-color="#00e6d0" stop-opacity=".34"/>
      <stop offset=".52" stop-color="#00e6d0" stop-opacity=".08"/>
      <stop offset="1" stop-color="#00e6d0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="roof" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#20302c"/>
      <stop offset=".45" stop-color="#0c1112"/>
      <stop offset="1" stop-color="#020303"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#moon)"/>
  <rect width="1600" height="900" fill="url(#neonRed)"/>
  <rect width="1600" height="900" fill="url(#neonCyan)"/>

  <g opacity=".72">
    <path d="M-40 324c85-42 172-57 260-44 92 14 184 5 276-27 94-33 191-38 291-16 110 24 218 12 324-38 136-63 295-55 477 25v270H-40Z" fill="#0a0d11"/>
