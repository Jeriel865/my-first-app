<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 620" role="img" aria-labelledby="title desc">
  <title id="title">Smooth hooded assassin</title>
  <desc id="desc">A smooth realistic hooded assassin with a red sash and hidden blade.</desc>
  <defs>
    <linearGradient id="cloak" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f3ead0"/>
      <stop offset=".16" stop-color="#e4dcc2"/>
      <stop offset=".26" stop-color="#111719"/>
      <stop offset=".72" stop-color="#07110f"/>
      <stop offset="1" stop-color="#020303"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#192825"/>
      <stop offset=".55" stop-color="#050707"/>
      <stop offset="1" stop-color="#000"/>
    </linearGradient>
    <linearGradient id="sash" x1="0" x2="1">
      <stop offset="0" stop-color="#b3152a"/>
      <stop offset=".45" stop-color="#ff3d6e"/>
      <stop offset="1" stop-color="#ffd166"/>
    </linearGradient>
    <linearGradient id="blade" x1="0" x2="1">
      <stop offset="0" stop-color="#27302e"/>
      <stop offset=".42" stop-color="#f3ead0"/>
      <stop offset=".72" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffd166"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.9 0 1 0 0 0.1 0 0 1 0 0.18 0 0 0 .55 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

